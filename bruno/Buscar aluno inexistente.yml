info:
  name: Buscar aluno inexistente
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/alunos/999999

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 404", function() {
          expect(res.getStatus()).to.equal(404);
        });

        test("deve seguir o padrão { erro: '...' }", function() {
          expect(res.getBody()).to.have.property('erro');
        });

        test("deve retornar a mensagem de erro correta", function() {
          expect(res.getBody().erro).to.equal('Aluno não encontrado');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
