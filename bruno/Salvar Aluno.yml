info:
  name: Salvar Aluno
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:3000/alunos
  body:
    type: json
    data: |-
      {
        "nome": "João Teste",
        "email": "joao@email.com",
        "senhaHash": "hash_temporario_456",
        "cidade": "Salinas"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("deve retornar status 201", function() {
          expect(res.getStatus()).to.equal(201);
        });

        test("não deve retornar senhaHash", function() {
          expect(res.getBody()).to.not.have.property('senhaHash');
        });

        test("deve retornar o nome do aluno criado", function() {
          expect(res.getBody().nome).to.equal('João Teste');
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
